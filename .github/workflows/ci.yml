name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Mỗi package Python lint + test độc lập. Job ai/ fail nghĩa là lỗi thuộc về AI,
  # không phải backend — đó là điểm của việc tách module.
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [ai, backend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # Luôn cài ai trước vì backend khai báo nó là dependency
        run: |
          pip install -e ./ai
          pip install -e "./${{ matrix.module }}[dev]"

      - name: Lint with ruff
        run: ruff check ${{ matrix.module }}/

      - name: Run tests
        working-directory: ${{ matrix.module }}
        run: pytest tests/ -v --tb=short
        env:
          APP_ENV: test
          OPENAI_API_KEY: test-key

  # Ranh giới module chỉ có giá trị khi có thứ gì đó kiểm tra nó.
  boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check module boundaries
        run: bash scripts/check_boundaries.sh

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
