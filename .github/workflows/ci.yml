name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Mỗi package Python lint + test độc lập. Job ai/ fail nghĩa là lỗi thuộc về AI,
  # không phải backend — đó là điểm của việc tách module.
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ${{ matrix.module == 'backend' && 'postgres:15-alpine' || '' }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: srrm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d srrm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    strategy:
      fail-fast: false
      matrix:
        module: [ai, backend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # Luôn cài ai trước vì backend khai báo nó là dependency
        run: |
          pip install -e ./ai
          pip install -e "./${{ matrix.module }}[dev]"

      - name: Lint with ruff
        run: ruff check ${{ matrix.module }}/

      - name: Run tests
        working-directory: ${{ matrix.module }}
        run: pytest tests/ -v --tb=short
        env:
          APP_ENV: test
          OPENAI_API_KEY: test-key
          DATABASE_URL: ${{ matrix.module == 'backend' && 'postgresql+psycopg://postgres:postgres@127.0.0.1:5432/srrm_test' || '' }}
          SRRM_BOOTSTRAP_TEST_DB: ${{ matrix.module == 'backend' && '1' || '0' }}

  # Ranh giới module chỉ có giá trị khi có thứ gì đó kiểm tra nó.
  boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check module boundaries
        run: bash scripts/check_boundaries.sh

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
